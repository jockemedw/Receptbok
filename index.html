<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#5c3d1e">
<title>Receptboken</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #fff9f2;
    --ink: #1a1209;
    --warm-brown: #5c3d1e;
    --terracotta: #c2522b;
    --sage: #7a9e7e;
    --gold: #d4a847;
    --light-sage: #eaf2eb;
    --light-terra: #fdf0eb;
    --border: #e8ddd0;
    --text-muted: #7a6a58;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--warm-brown);
    color: var(--cream);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06), 0 4px 28px rgba(0,0,0,0.2);
  }

  .header-bar {
    display: flex;
    align-items: stretch;
    padding: 0 1.25rem;
    height: 54px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--cream);
    display: flex;
    align-items: center;
    margin-right: auto;
    padding-right: 1.5rem;
  }

  header h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .header-nav {
    display: flex;
  }

  .header-tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: rgba(250,247,242,0.45);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    padding: 0 1.1rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.25s;
    white-space: nowrap;
    height: 100%;
  }

  .header-tab:hover { color: rgba(250,247,242,0.75); }

  .header-tab.active {
    color: var(--cream);
    border-bottom-color: var(--gold);
  }

  /* ── SEARCH AREA (collapsible) ── */
  .header-search-area {
    padding: 0.6rem 1.25rem 0.85rem;
    overflow: hidden;
    max-height: 130px;
    opacity: 1;
    transition: max-height 0.3s ease, opacity 0.25s ease, padding 0.3s ease;
  }

  .header-search-area.hidden {
    max-height: 0;
    opacity: 0;
    padding-top: 0;
    padding-bottom: 0;
  }

  /* ── SEARCH ── */
  .search-wrap { position: relative; }

  #search {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.4rem;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.18);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: background 0.2s, border-color 0.2s;
  }

  #search::placeholder { color: rgba(250,247,242,0.45); }
  #search:focus {
    background: rgba(0,0,0,0.28);
    border-color: rgba(255,255,255,0.22);
  }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.5;
    font-size: 0.9rem;
    pointer-events: none;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.55rem;
    overflow-x: auto;
    flex-wrap: nowrap;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    color: rgba(250,247,242,0.7);
    padding: 0.25rem 0.75rem;
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .filter-btn:hover {
    background: rgba(255,255,255,0.14);
    color: var(--cream);
  }

  .filter-btn.active {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: var(--cream);
  }

  .recipe-count { display: none; }

  /* ── MAIN ── */
  main {
    padding: 1.5rem 1rem 4rem;
    max-width: 680px;
    margin: 0 auto;
  }

  .results-info {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
    font-style: italic;
  }

  /* ── WEEKLY PLAN BANNER ── */
  .plan-banner {
    background: var(--light-terra);
    border: 1px solid #f0d5c8;
    border-radius: 12px;
    padding: 1rem 1.1rem;
    margin-bottom: 1.2rem;
    display: none;
  }

  .plan-banner.visible { display: block; }

  .plan-banner-title {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--terracotta);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.6rem;
  }

  .plan-days {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.4rem;
  }

  .plan-day {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.7rem;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .plan-day:hover {
    border-color: var(--terracotta);
    box-shadow: 0 2px 8px rgba(194,82,43,0.1);
  }

  .plan-day-name {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    font-weight: 500;
  }

  .plan-day-recipe {
    font-family: 'Playfair Display', serif;
    font-size: 0.88rem;
    color: var(--ink);
    line-height: 1.3;
    margin-top: 0.15rem;
  }

  /* ── RECIPE GRID ── */
  .recipe-grid {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .recipe-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .recipe-card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border-color: #d4c4b4;
  }

  .recipe-card.open {
    border-color: var(--terracotta);
    box-shadow: 0 4px 20px rgba(194,82,43,0.1);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 1rem 1.1rem;
    cursor: pointer;
    user-select: none;
  }

  .recipe-num {
    font-size: 0.72rem;
    color: var(--text-muted);
    min-width: 1.5rem;
    opacity: 0.5;
    font-weight: 300;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }

  .pill {
    font-size: 0.7rem;
    padding: 0.2rem 0.55rem;
    border-radius: 20px;
    font-weight: 500;
  }

  .pill-protein  { background: var(--light-terra); color: var(--terracotta); }
  .pill-time     { background: #f2ede8; color: var(--text-muted); }
  .pill-tested   { background: var(--light-sage); color: #4a7d4e; }
  .pill-untested { background: #f4f2ef; color: #b0a090; }

  .card-chevron {
    color: var(--text-muted);
    font-size: 1.4rem;
    transition: transform 0.25s;
    opacity: 0.5;
    flex-shrink: 0;
  }

  .recipe-card.open .card-chevron {
    transform: rotate(90deg);
    opacity: 1;
    color: var(--terracotta);
  }

  /* ── DETAIL ── */
  .recipe-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .recipe-card.open .recipe-detail { max-height: 4000px; }

  .detail-inner {
    border-top: 1px solid var(--border);
    padding: 1.2rem 1.1rem 1.4rem;
    display: grid;
    gap: 1.4rem;
    background: var(--warm-white);
  }

  .detail-section h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 0.75rem;
  }

  /* ── INGREDIENTS ── */
  .ingredients-list {
    list-style: none;
    display: flex;
    flex-direction: column;
  }

  .ingredients-list li {
    font-size: 0.9rem;
    padding: 0.35rem 0;
    border-bottom: 1px solid #f0ece6;
    line-height: 1.45;
    display: flex;
    gap: 0.5rem;
    align-items: baseline;
    color: var(--ink);
  }

  .ingredients-list li::before {
    content: '·';
    color: var(--terracotta);
    flex-shrink: 0;
    font-size: 1.1rem;
    line-height: 1;
  }

  .ingredients-list li.group-header {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 500;
    padding-top: 0.7rem;
    border-bottom: none;
  }

  .ingredients-list li.group-header::before { display: none; }

  .ing-group {
    color: var(--text-muted);
    font-size: 0.8rem;
    flex-shrink: 0;
  }

  /* ── STEPS ── */
  .steps-list {
    list-style: none;
    counter-reset: step;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }

  .steps-list li {
    counter-increment: step;
    display: grid;
    grid-template-columns: 1.8rem 1fr;
    gap: 0.65rem;
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--ink);
  }

  .steps-list li::before {
    content: counter(step);
    font-size: 0.7rem;
    font-weight: 600;
    color: white;
    background: var(--warm-brown);
    width: 1.5rem;
    height: 1.5rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 0.2rem;
    flex-shrink: 0;
  }

  /* ── NOTES ── */
  .notes-box {
    background: #fffbf0;
    border: 1px solid #f0dfa0;
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    padding: 0.75rem 0.9rem;
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.6;
    font-style: italic;
  }

  /* ── EMPTY & LOADING ── */
  .empty, .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }

  .loading-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
    display: inline-block;
    animation: spin 1.5s linear infinite;
    opacity: 0.4;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCROLL TO TOP ── */
  #scrolltop {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--warm-brown);
    color: white;
    border: none;
    border-radius: 50%;
    width: 2.8rem;
    height: 2.8rem;
    font-size: 1.2rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 99;
    transition: transform 0.15s;
  }

  #scrolltop:hover { transform: scale(1.08); }
  #scrolltop.visible { display: flex; }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    opacity: 0.6;
  }


  /* ── WEEK VIEW ── */
  #weekView {
    display: none;
    padding: 1.5rem 0 4rem;
    max-width: 680px;
    margin: 0 auto;
  }

  #weekView.visible { display: block; }

  .week-section {
    margin-bottom: 2rem;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--warm-brown);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0 1rem;
  }

  /* ── TIMELINE ── */
  .timeline-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    padding: 0.5rem 1rem 1rem;
  }

  .timeline-wrap::-webkit-scrollbar { height: 4px; }
  .timeline-wrap::-webkit-scrollbar-track { background: transparent; }
  .timeline-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .timeline {
    display: flex;
    gap: 0.6rem;
    width: max-content;
    padding: 0.25rem 0;
  }

  .week-day-card {
    width: 150px;
    flex-shrink: 0;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 0.85rem;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
  }

  .week-day-card.past { opacity: 0.45; }

  .week-day-card.today {
    border-color: var(--terracotta);
    box-shadow: 0 2px 14px rgba(194,82,43,0.18);
    background: var(--light-terra);
  }

  .week-day-card.today .week-day-name { color: var(--terracotta); }

  .week-day-card:hover {
    opacity: 1;
    border-color: var(--terracotta);
    box-shadow: 0 2px 10px rgba(194,82,43,0.12);
  }

  .week-day-name {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 0.35rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .today-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--terracotta);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .week-day-recipe {
    font-family: 'Playfair Display', serif;
    font-size: 0.88rem;
    color: var(--ink);
    line-height: 1.35;
  }

  .week-meta {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 0.75rem;
    padding: 0 1rem;
  }

  /* ── SHOPPING LIST ── */
  .shopping-category {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 0.8rem;
  }

  .shopping-cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 1rem;
    background: #f9f6f1;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .shopping-cat-name {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--warm-brown);
  }

  .shopping-cat-count {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .shopping-items {
    list-style: none;
    padding: 0.4rem 0;
  }

  .shopping-item {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.55rem 1rem;
    border-bottom: 1px solid #f5f0ea;
    cursor: pointer;
    transition: background 0.15s;
  }

  .shopping-item:last-child { border-bottom: none; }

  .shopping-item:hover { background: #fdf9f5; }

  .shopping-item.checked {
    opacity: 0.4;
  }

  .shopping-item.checked .item-text {
    text-decoration: line-through;
  }

  .item-checkbox {
    width: 1.15rem;
    height: 1.15rem;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    background: white;
    transition: background 0.15s, border-color 0.15s;
  }

  .shopping-item.checked .item-checkbox {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
  }

  .item-text {
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.4;
  }

  /* ── TRIGGER BUTTON ── */
  .trigger-section {
    text-align: center;
    padding: 1.5rem 0 0.5rem;
  }

  .trigger-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 30px;
    padding: 0.75rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 16px rgba(194,82,43,0.25);
  }

  .trigger-btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .trigger-hint {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.6rem;
    font-style: italic;
  }

  .trigger-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--warm-brown);
    margin-bottom: 1.1rem;
  }

  .date-range {
    display: flex;
    align-items: flex-end;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 0.9rem;
  }

  .date-field {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .date-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 500;
  }

  .date-input {
    padding: 0.6rem 0.75rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: white;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  .date-input:focus { border-color: var(--terracotta); }
  .date-input::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }

  .date-sep {
    font-size: 1.1rem;
    color: var(--text-muted);
    padding-bottom: 0.55rem;
  }

  .date-hint {
    font-size: 0.85rem;
    color: var(--warm-brown);
    font-weight: 500;
    min-height: 1.3em;
    margin-bottom: 1rem;
  }

  .trigger-dates {
    display: none;
    margin-top: 0.85rem;
    background: #f2ede8;
    border-radius: 8px;
    padding: 0.7rem 1rem;
    font-size: 0.82rem;
    color: var(--ink);
    font-family: monospace;
    line-height: 1.8;
    text-align: left;
    max-width: 280px;
    margin-left: auto;
    margin-right: auto;
  }

  .trigger-dates.visible { display: block; }

  /* ── NO DATA ── */
  .no-data {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
  }

  .no-data-icon { font-size: 2rem; margin-bottom: 0.75rem; }

  /* ── SETTINGS PANEL ── */
  .settings-toggle-wrap {
    margin-bottom: 0.75rem;
  }

  .settings-toggle {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 0.4rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .settings-toggle:hover {
    border-color: var(--warm-brown);
    color: var(--warm-brown);
  }

  .settings-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .settings-panel.open {
    max-height: 600px;
  }

  .settings-inner {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    text-align: left;
    margin-bottom: 1rem;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .setting-label {
    font-size: 0.82rem;
    color: var(--ink);
    font-weight: 500;
    flex: 1;
  }

  .setting-sublabel {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 400;
    display: block;
    margin-top: 0.1rem;
  }

  .setting-control {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .setting-num {
    width: 3.8rem;
    padding: 0.4rem 0.5rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .setting-num:focus { border-color: var(--terracotta); }

  .setting-unit {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .setting-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0;
  }

  .setting-row-proteins {
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .protein-checks {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .prot-btn {
    background: #f4f2ef;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
    user-select: none;
  }

  .prot-btn.active {
    background: var(--light-terra);
    border-color: var(--terracotta);
    color: var(--terracotta);
  }

  .settings-warning {
    font-size: 0.75rem;
    color: var(--terracotta);
    font-style: italic;
    margin-top: 0.25rem;
    display: none;
  }

  .settings-warning.visible { display: block; }

  /* ── INSTRUCTIONS ── */
  .instructions-field {
    width: 100%;
    min-height: 80px;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    background: var(--warm-white);
    resize: vertical;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.2s;
    margin-bottom: 0.75rem;
  }
  .instructions-field:focus { border-color: var(--terracotta); }
  .instructions-label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 0.35rem;
    display: block;
  }

  /* ── GENERATE BUTTON & STATUS ── */
  .generate-btn {
    width: 100%;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 0.9rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 0.25rem;
  }
  .generate-btn:hover { opacity: 0.9; }
  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  .trigger-status {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    text-align: center;
    min-height: 1.4em;
    color: var(--text-muted);
  }
  .trigger-status.error { color: var(--terracotta); }
  .trigger-status.success { color: var(--sage); font-weight: 500; }

  /* ── SHOPPING LIST MODE TOGGLE ── */
  .shop-mode-bar {
    display: flex;
    gap: 0;
    background: var(--border);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 1rem;
  }
  .shop-mode-btn {
    flex: 1;
    background: transparent;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.18s;
  }
  .shop-mode-btn.active {
    background: white;
    color: var(--warm-brown);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  /* ── SHOPPING TEXT VIEW ── */
  .shop-text-view { display: none; }
  .shop-text-view.visible { display: block; }
  .shop-text-category {
    margin-bottom: 1.1rem;
  }
  .shop-text-cat-name {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--warm-brown);
    margin-bottom: 0.35rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .shop-text-items {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--ink);
    white-space: pre-wrap;
  }
  .shop-copy-btn {
    margin-top: 0.75rem;
    background: var(--light-terra);
    border: 1.5px solid var(--border);
    color: var(--warm-brown);
    border-radius: 8px;
    padding: 0.5rem 1.1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .shop-copy-btn:hover { background: #f5e5dd; }
</style>
</head>
<body>

<header>
  <div class="header-bar">
    <h1>Recept<em>boken</em></h1>
    <nav class="header-nav">
      <button class="header-tab active" id="tabRecept" onclick="switchTab('recept')">Recept</button>
      <button class="header-tab" id="tabVecka" onclick="switchTab('vecka')">Veckans mat</button>
    </nav>
  </div>
  <div class="header-search-area" id="headerSearchArea">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" type="search" placeholder="Sök på namn, ingrediens, tagg…" autocomplete="off">
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="alla">Alla</button>
      <button class="filter-btn" data-filter="provat">✓ Provat</button>
      <button class="filter-btn" data-filter="fisk">Fisk</button>
      <button class="filter-btn" data-filter="kyckling">Kyckling</button>
      <button class="filter-btn" data-filter="vegetarisk">Vegetarisk</button>
      <button class="filter-btn" data-filter="kött">Kött</button>
      <button class="filter-btn" data-filter="fläsk">Fläsk</button>
      <button class="filter-btn" data-filter="snabb">Snabb &lt;30 min</button>
      <button class="filter-btn" data-filter="soppa">Soppa</button>
      <button class="filter-btn" data-filter="pasta">Pasta</button>
    </div>
  </div>
</header>

<main id="receptView">
  <p class="results-info" id="resultsInfo"></p>

  <div id="loadingState" class="loading">
    <div class="loading-icon">⟳</div>
    <p>Laddar receptbok…</p>
  </div>

  <div class="recipe-grid" id="recipeGrid"></div>

  <div class="empty" id="emptyState" style="display:none">
    <div style="font-size:2.5rem;margin-bottom:1rem">🍽️</div>
    <p>Inga recept matchade sökningen.</p>
  </div>
</main>

<div id="weekView">
  <div id="weekLoading" class="no-data">
    <div class="no-data-icon">⏳</div>
    <p>Laddar matsedeln…</p>
  </div>

  <div id="weekNoData" class="no-data" style="display:none">
    <div class="no-data-icon">📋</div>
    <p>Ingen veckoplan genererad ännu.</p>
  </div>

  <div id="weekContent" style="display:none">
    <div class="week-section">
      <h2 class="section-title">🗓 Matsedeln</h2>
      <p class="week-meta" id="weekMeta"></p>
      <div class="timeline-wrap">
        <div class="timeline" id="weekGrid"></div>
      </div>
    </div>

    <div class="week-section">
      <h2 class="section-title">🛒 Inköpslista</h2>
      <div class="shop-mode-bar">
        <button class="shop-mode-btn active" id="modeBtnHandla" onclick="setShopMode('handla')">✓ Handla</button>
        <button class="shop-mode-btn" id="modeBtnText" onclick="setShopMode('text')">Kopiera lista</button>
      </div>
      <div id="shoppingList"></div>
      <div id="shoppingText" class="shop-text-view"></div>
    </div>
  </div>

  <div class="trigger-section">
    <h3 class="trigger-title">Generera ny plan</h3>
    <div class="date-range">
      <div class="date-field">
        <label class="date-label" for="startDate">Från</label>
        <input type="date" id="startDate" class="date-input">
      </div>
      <div class="date-sep">→</div>
      <div class="date-field">
        <label class="date-label" for="endDate">Till</label>
        <input type="date" id="endDate" class="date-input">
      </div>
    </div>
    <p class="date-hint" id="dateHint"></p>

    <label class="instructions-label">Önskemål & instruktioner</label>
    <textarea id="instructions" class="instructions-field">Välj omväxlande recept med variation i protein och tillagningssätt. Undvik att ha samma typ av rätt flera dagar i rad.</textarea>

    <div class="settings-toggle-wrap">
      <button class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
        ⚙ Inställningar <span id="settingsArrow">▾</span>
      </button>
    </div>

    <div class="settings-panel" id="settingsPanel">
      <div class="settings-inner">

        <div class="setting-row">
          <label class="setting-label">
            Oprövade recept
            <span class="setting-sublabel">Max antal recept vi inte testat</span>
          </label>
          <div class="setting-control">
            <input type="number" id="untestedCount" class="setting-num"
                   min="0" max="7" value="0" onchange="updateDateHint()">
            <span class="setting-unit">st</span>
          </div>
        </div>

        <hr class="setting-divider">

        <div class="setting-row">
          <label class="setting-label">
            Max tid vardagar
            <span class="setting-sublabel">Tillåten tillagningstid vardag</span>
          </label>
          <div class="setting-control">
            <input type="number" id="maxWeekdayTime" class="setting-num"
                   min="15" max="60" step="5" value="30" onchange="updateDateHint()">
            <span class="setting-unit">min</span>
          </div>
        </div>

        <div class="setting-row">
          <label class="setting-label">
            Max tid helg
            <span class="setting-sublabel">Tillåten tillagningstid helg</span>
          </label>
          <div class="setting-control">
            <input type="number" id="maxWeekendTime" class="setting-num"
                   min="30" max="120" step="15" value="60" onchange="updateDateHint()">
            <span class="setting-unit">min</span>
          </div>
        </div>

        <hr class="setting-divider">

        <div class="setting-row">
          <label class="setting-label">
            Vegetariska dagar
            <span class="setting-sublabel">Minst X dagar utan kött/fisk</span>
          </label>
          <div class="setting-control">
            <input type="number" id="vegetarianDays" class="setting-num"
                   min="0" max="7" value="0" onchange="updateDateHint()">
            <span class="setting-unit">dagar</span>
          </div>
        </div>

        <hr class="setting-divider">

        <div class="setting-row setting-row-proteins">
          <label class="setting-label">
            Proteiner att inkludera
            <span class="setting-sublabel">Avmarkera för att exkludera helt</span>
          </label>
          <div class="protein-checks">
            <button class="prot-btn active" data-prot="fisk"       onclick="toggleProtein(this)">Fisk</button>
            <button class="prot-btn active" data-prot="kyckling"   onclick="toggleProtein(this)">Kyckling</button>
            <button class="prot-btn active" data-prot="kött"       onclick="toggleProtein(this)">Kött</button>
            <button class="prot-btn active" data-prot="fläsk"      onclick="toggleProtein(this)">Fläsk</button>
            <button class="prot-btn active" data-prot="vegetarisk" onclick="toggleProtein(this)">Vegetarisk</button>
          </div>
          <p class="settings-warning" id="protWarning">
            Minst ett protein måste vara valt.
          </p>
        </div>

      </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generatePlan()">
      ✨ Generera ny plan
    </button>
    <div class="trigger-status" id="triggerStatus"></div>
  </div>
</div>

<footer id="footerEl">Receptboken</footer>
<button id="scrolltop" title="Till toppen">↑</button>

<script>
const proteinLabel = {
  fisk: 'Fisk/Skaldjur', kyckling: 'Kyckling', kött: 'Kött',
  fläsk: 'Fläsk', vegetarisk: 'Vegetarisk'
};

function timeStr(r) {
  if (!r.time) return null;
  const base = r.time < 60 ? r.time + ' min' : (r.time/60).toFixed(1).replace('.0','') + ' h';
  return r.timeNote && r.timeNote.startsWith('+') ? base + ' ' + r.timeNote : base;
}

function renderIngredient(i) {
  if (!i.includes(':')) return `<li>${i}</li>`;
  const colon = i.indexOf(':');
  const label = i.substring(0, colon).trim();
  const val   = i.substring(colon + 1).trim();
  if (!val) return `<li class="group-header">${label}</li>`;
  return `<li><span class="ing-group">${label}:</span> ${val}</li>`;
}

function renderCard(r) {
  const t = timeStr(r);
  const ingHtml   = r.ingredients.map(renderIngredient).join('');
  const stepsHtml = r.instructions.map(s => `<li>${s}</li>`).join('');
  const notesHtml = r.notes
    ? `<div class="detail-section"><h3>Noteringar</h3><div class="notes-box">💡 ${r.notes}</div></div>`
    : '';

  return `
<div class="recipe-card"
     data-id="${r.id}"
     data-title="${r.title.toLowerCase()}"
     data-protein="${r.protein}"
     data-tags="${r.tags.join(' ')}"
     data-tested="${r.tested}"
     data-time="${r.time || 999}"
     data-ingredients="${r.ingredients.join(' ').toLowerCase()}"
     data-instructions="${r.instructions.join(' ').toLowerCase()}">
  <div class="card-header" onclick="toggleCard(this.closest('.recipe-card'))">
    <div class="recipe-num">${r.id}</div>
    <div class="card-info">
      <div class="card-title">${r.title}</div>
      <div class="card-meta">
        <span class="pill pill-protein">${proteinLabel[r.protein] || r.protein}</span>
        ${t ? `<span class="pill pill-time">⏱ ${t}</span>` : ''}
        <span class="pill ${r.tested ? 'pill-tested' : 'pill-untested'}">${r.tested ? '✓ Provat' : 'Ej provat'}</span>
      </div>
    </div>
    <span class="card-chevron">›</span>
  </div>
  <div class="recipe-detail">
    <div class="detail-inner">
      <div class="detail-section">
        <h3>Ingredienser · ${r.servings} portioner</h3>
        <ul class="ingredients-list">${ingHtml}</ul>
      </div>
      <div class="detail-section">
        <h3>Tillagning</h3>
        <ol class="steps-list">${stepsHtml}</ol>
      </div>
      ${notesHtml}
    </div>
  </div>
</div>`;
}

let RECIPES = [];
let activeFilter = 'alla';

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cards = document.querySelectorAll('.recipe-card');
  let shown = 0;

  cards.forEach(card => {
    const protein = card.dataset.protein;
    const tags    = card.dataset.tags;
    const tested  = card.dataset.tested === 'true';
    const time    = parseInt(card.dataset.time);
    const title   = card.dataset.title;
    const ings    = card.dataset.ingredients;
    const steps   = card.dataset.instructions;

    let passFilter = true;
    if (activeFilter === 'provat')     passFilter = tested;
    else if (activeFilter === 'snabb') passFilter = time <= 30;
    else if (activeFilter !== 'alla')  passFilter = protein === activeFilter || tags.includes(activeFilter);

    const passSearch = !q || title.includes(q) || protein.includes(q) || tags.includes(q)
      || ings.includes(q) || steps.includes(q);

    const show = passFilter && passSearch;
    card.style.display = show ? '' : 'none';
    if (!show) card.classList.remove('open');
    if (show) shown++;
  });

  document.getElementById('emptyState').style.display = shown === 0 ? 'block' : 'none';
  document.getElementById('resultsInfo').textContent = (q || activeFilter !== 'alla')
    ? `Visar ${shown} av ${RECIPES.length} recept` : '';
}

function toggleCard(card) {
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.recipe-card.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    card.classList.add('open');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
  }
}

// ── DATE PICKERS ───────────────────────────────────────────
function fmtIso(date) {
  return date.toISOString().split('T')[0];
}

function fmtShort(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T12:00:00');
  return d.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
}

function initDatePickers() {
  const today = new Date();
  const end = new Date(today);
  end.setDate(today.getDate() + 6);

  document.getElementById('startDate').value = fmtIso(today);
  document.getElementById('endDate').value = fmtIso(end);
  document.getElementById('startDate').addEventListener('change', updateDateHint);
  document.getElementById('endDate').addEventListener('change', updateDateHint);
  document.getElementById('untestedCount').addEventListener('change', updateDateHint);
  document.getElementById('maxWeekdayTime').addEventListener('change', updateDateHint);
  document.getElementById('maxWeekendTime').addEventListener('change', updateDateHint);
  document.getElementById('vegetarianDays').addEventListener('change', updateDateHint);
  updateDateHint();
}

function getSelectedProteins() {
  return Array.from(document.querySelectorAll('.prot-btn.active')).map(b => b.dataset.prot);
}

function toggleProtein(btn) {
  const willDeactivate = btn.classList.contains('active');
  const activeCount = document.querySelectorAll('.prot-btn.active').length;
  if (willDeactivate && activeCount <= 1) {
    document.getElementById('protWarning').classList.add('visible');
    return;
  }
  document.getElementById('protWarning').classList.remove('visible');
  btn.classList.toggle('active');
  updateDateHint();
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const arrow = document.getElementById('settingsArrow');
  const open  = panel.classList.toggle('open');
  arrow.textContent = open ? '▴' : '▾';
}

function updateDateHint() {
  const startVal = document.getElementById('startDate').value;
  const endVal   = document.getElementById('endDate').value;
  const hint     = document.getElementById('dateHint');

  if (!startVal || !endVal) { hint.textContent = ''; return; }

  const diff = Math.round(
    (new Date(endVal + 'T12:00:00') - new Date(startVal + 'T12:00:00')) / 864e5
  ) + 1;

  if (diff < 1) {
    hint.textContent = 'Slutdatum måste vara efter startdatum';
    hint.style.color = 'var(--terracotta)';
    return;
  }
  if (diff > 15) {
    hint.textContent = 'Max 15 dagar';
    hint.style.color = 'var(--terracotta)';
    return;
  }

  hint.textContent = `${diff} dag${diff !== 1 ? 'ar' : ''} planeras`;
  hint.style.color = 'var(--warm-brown)';
}

async function generatePlan() {
  const startVal = document.getElementById('startDate').value;
  const endVal   = document.getElementById('endDate').value;
  const status   = document.getElementById('triggerStatus');
  const btn      = document.getElementById('generateBtn');

  if (!startVal || !endVal) {
    status.textContent = 'Välj start- och slutdatum.';
    status.className = 'trigger-status error';
    return;
  }

  const diff = Math.round(
    (new Date(endVal + 'T12:00:00') - new Date(startVal + 'T12:00:00')) / 864e5
  ) + 1;
  if (diff < 1 || diff > 15) return;

  btn.disabled = true;
  status.textContent = 'Genererar… detta tar upp till en minut.';
  status.className = 'trigger-status';

  try {
    const body = {
      start_date:      startVal,
      end_date:        endVal,
      instructions:    document.getElementById('instructions').value,
      allowed_proteins: getSelectedProteins().join(','),
      untested_count:  document.getElementById('untestedCount').value,
      max_weekday_time: document.getElementById('maxWeekdayTime').value,
      max_weekend_time: document.getElementById('maxWeekendTime').value,
      vegetarian_days: document.getElementById('vegetarianDays').value,
    };

    const res = await fetch('https://receptbok-six.vercel.app/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Okänt fel');

    status.textContent = `✓ Klar! ${data.days} dagar planerade.`;
    status.className = 'trigger-status success';
    btn.disabled = false;
    if (data.weeklyPlan) {
      renderWeeklyPlanData(data.weeklyPlan, data.shoppingList);
    }
    switchTab('vecka');
  } catch (err) {
    status.textContent = `Fel: ${err.message}`;
    status.className = 'trigger-status error';
    btn.disabled = false;
  }
}

function jumpToRecipe(title) {
  switchTab('recept');
  activeFilter = 'alla';
  document.getElementById('search').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="alla"]').classList.add('active');
  applyFilters();
  document.querySelectorAll('.recipe-card').forEach(card => {
    if (card.dataset.title === title.toLowerCase()) {
      toggleCard(card);
      setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }
  });
}

function switchTab(tab) {
  const isRecept = tab === 'recept';
  document.getElementById('receptView').style.display = isRecept ? '' : 'none';
  document.getElementById('weekView').classList.toggle('visible', !isRecept);
  document.getElementById('tabRecept').classList.toggle('active', isRecept);
  document.getElementById('tabVecka').classList.toggle('active', !isRecept);
  document.getElementById('headerSearchArea').classList.toggle('hidden', !isRecept);
  window.scrollTo({ top: 0 });
}

// ── SHOPPING LIST ──────────────────────────────────────────
const SHOP_KEY = 'shopping_checked';
let _shopCategories = null;

function setShopMode(mode) {
  const isHandla = mode === 'handla';
  document.getElementById('modeBtnHandla').classList.toggle('active', isHandla);
  document.getElementById('modeBtnText').classList.toggle('active', !isHandla);
  document.getElementById('shoppingList').style.display = isHandla ? '' : 'none';
  document.getElementById('shoppingText').classList.toggle('visible', !isHandla);
}

function getChecked(generated) {
  try {
    const stored = JSON.parse(localStorage.getItem(SHOP_KEY) || '{}');
    // Invalidate if list was regenerated
    if (stored.generated !== generated) return { generated, items: {} };
    return stored;
  } catch { return { generated, items: {} }; }
}

function saveChecked(state) {
  localStorage.setItem(SHOP_KEY, JSON.stringify(state));
}

function renderShoppingList(categories, generated) {
  _shopCategories = categories;
  const state = getChecked(generated);
  const catIcons = {
    'Mejeri': '🥛', 'Grönsaker': '🥦', 'Fisk & kött': '🥩',
    'Skafferi': '🫙', 'Frukt': '🍎', 'Övrigt': '🛍️'
  };

  // ── Handla-läge (checkboxar) ──
  const checkHtml = Object.entries(categories)
    .filter(([, items]) => items.length > 0)
    .map(([cat, items]) => {
      const icon = catIcons[cat] || '•';
      const itemsHtml = items.map((item, idx) => {
        const key = `${cat}::${idx}`;
        const checked = state.items[key] || false;
        return `<li class="shopping-item${checked ? ' checked' : ''}"
                    onclick="toggleShopItem(this,'${key}','${generated.replace(/'/g,"\\'")}')">
          <span class="item-checkbox">${checked ? '✓' : ''}</span>
          <span class="item-text">${item}</span>
        </li>`;
      }).join('');
      return `<div class="shopping-category">
        <div class="shopping-cat-header">
          <span class="shopping-cat-name">${icon} ${cat}</span>
          <span class="shopping-cat-count">${items.length} varor</span>
        </div>
        <ul class="shopping-items">${itemsHtml}</ul>
      </div>`;
    }).join('');

  document.getElementById('shoppingList').innerHTML = checkHtml;

  // ── Text-läge (kopierbar) ──
  const textBlocks = Object.entries(categories)
    .filter(([, items]) => items.length > 0)
    .map(([cat, items]) => `<div class="shop-text-category">
      <div class="shop-text-cat-name">${catIcons[cat] || '•'} ${cat}</div>
      <div class="shop-text-items">${items.map(i => '• ' + i).join('\n')}</div>
    </div>`).join('');

  const fullText = Object.entries(categories)
    .filter(([, items]) => items.length > 0)
    .map(([cat, items]) => `${cat}:\n${items.map(i => '• ' + i).join('\n')}`)
    .join('\n\n');

  document.getElementById('shoppingText').innerHTML =
    textBlocks +
    `<button class="shop-copy-btn" onclick="copyShoppingList()">Kopiera hela listan</button>`;

  document.getElementById('shoppingText')._fullText = fullText;
}

function copyShoppingList() {
  const el = document.getElementById('shoppingText');
  navigator.clipboard.writeText(el._fullText || '').then(() => {
    const btn = el.querySelector('.shop-copy-btn');
    btn.textContent = 'Kopierad!';
    setTimeout(() => { btn.textContent = 'Kopiera hela listan'; }, 2000);
  });
}

function toggleShopItem(el, key, generated) {
  const state = getChecked(generated);
  const nowChecked = !state.items[key];
  state.items[key] = nowChecked;
  saveChecked(state);
  el.classList.toggle('checked', nowChecked);
  el.querySelector('.item-checkbox').textContent = nowChecked ? '✓' : '';
}

function renderWeeklyPlanData(plan, shop) {
  if (!plan?.days?.length) { document.getElementById('weekNoData').style.display = ''; return; }

  document.getElementById('weekLoading').style.display = 'none';
  document.getElementById('weekNoData').style.display = 'none';
  document.getElementById('weekContent').style.display = '';

  const metaParts = [];
  if (plan.startDate && plan.endDate)
    metaParts.push(`${fmtShort(plan.startDate)} – ${fmtShort(plan.endDate)}`);
  else if (plan.week)
    metaParts.push(`Vecka ${plan.week}`);
  metaParts.push(`Genererad ${plan.generated}`);
  document.getElementById('weekMeta').textContent = metaParts.join(' · ');

  const todayIso = fmtIso(new Date());
  document.getElementById('weekGrid').innerHTML = plan.days.map(d => {
    const isToday = d.date === todayIso;
    const isPast  = d.date < todayIso;
    const cls     = isToday ? ' today' : isPast ? ' past' : '';
    const dot     = isToday ? '<span class="today-dot"></span>' : '';
    return `<div class="week-day-card${cls}" onclick="jumpToRecipe('${d.recipe.replace(/'/g,"\\'")}')">
      <div class="week-day-name">${d.day}${d.date ? ' · ' + fmtShort(d.date) : ''}${dot}</div>
      <div class="week-day-recipe">${d.recipe}</div>
    </div>`;
  }).join('');

  setTimeout(() => {
    const target = document.querySelector('.week-day-card.today')
                || document.querySelector('.week-day-card:not(.past)');
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }, 150);

  if (shop?.categories) {
    renderShoppingList(shop.categories, shop.generated || plan.generated);
  }
}

async function loadWeeklyPlan() {
  try {
    const res = await fetch('https://receptbok-six.vercel.app/api/plan');
    document.getElementById('weekLoading').style.display = 'none';
    if (!res.ok) { document.getElementById('weekNoData').style.display = ''; return; }
    const data = await res.json();
    const plan = data.weeklyPlan;
    const shop = data.shoppingList;
    if (!plan?.days?.length) { document.getElementById('weekNoData').style.display = ''; return; }
    renderWeeklyPlanData(plan, shop);
    switchTab('vecka');
  } catch(e) {
    document.getElementById('weekLoading').style.display = 'none';
    document.getElementById('weekNoData').style.display = '';
  }
}

async function init() {
  try {
    const res = await fetch('recipes.json');
    if (!res.ok) throw new Error('Kunde inte ladda recipes.json');
    const data = await res.json();
    RECIPES = data.recipes;
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('recipeGrid').innerHTML = RECIPES.map(renderCard).join('');
    document.getElementById('countDisplay').textContent = `${RECIPES.length} recept`;
    document.getElementById('footerEl').textContent =
      `Receptboken · ${data.meta?.lastUpdated || ''} · ${RECIPES.length} recept`;
    applyFilters();
    initDatePickers();
  } catch(err) {
    document.getElementById('loadingState').innerHTML = `
      <div style="font-size:2rem;margin-bottom:1rem">⚠️</div>
      <p style="color:var(--terracotta)">${err.message}</p>`;
  }
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  applyFilters();
});

const scrollBtn = document.getElementById('scrolltop');
window.addEventListener('scroll', () => scrollBtn.classList.toggle('visible', window.scrollY > 400));
scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

init();
loadWeeklyPlan();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#5c3d1e">
<title>Receptboken</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #fff9f2;
    --ink: #1a1209;
    --warm-brown: #5c3d1e;
    --terracotta: #c2522b;
    --sage: #7a9e7e;
    --gold: #d4a847;
    --light-sage: #eaf2eb;
    --light-terra: #fdf0eb;
    --border: #e8ddd0;
    --text-muted: #7a6a58;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--warm-brown);
    color: var(--cream);
    padding: 2rem 1.5rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.15);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 5vw, 1.8rem);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  header h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .recipe-count {
    font-size: 0.8rem;
    background: rgba(255,255,255,0.15);
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    white-space: nowrap;
    font-weight: 500;
  }

  /* ── SEARCH ── */
  .search-wrap { position: relative; }

  #search {
    width: 100%;
    padding: 0.7rem 1rem 0.7rem 2.5rem;
    border-radius: 30px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: background 0.2s;
  }

  #search::placeholder { color: rgba(250,247,242,0.6); }
  #search:focus { background: rgba(255,255,255,0.22); }

  .search-icon {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.7;
    font-size: 1rem;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.8rem;
  }

  .filter-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--cream);
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--terracotta);
    border-color: var(--terracotta);
  }

  /* ── MAIN ── */
  main {
    padding: 1.5rem 1rem 4rem;
    max-width: 680px;
    margin: 0 auto;
  }

  .results-info {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
    font-style: italic;
  }

  /* ── WEEKLY PLAN BANNER ── */
  .plan-banner {
    background: var(--light-terra);
    border: 1px solid #f0d5c8;
    border-radius: 12px;
    padding: 1rem 1.1rem;
    margin-bottom: 1.2rem;
    display: none;
  }

  .plan-banner.visible { display: block; }

  .plan-banner-title {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--terracotta);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.6rem;
  }

  .plan-days {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.4rem;
  }

  .plan-day {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.7rem;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .plan-day:hover {
    border-color: var(--terracotta);
    box-shadow: 0 2px 8px rgba(194,82,43,0.1);
  }

  .plan-day-name {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    font-weight: 500;
  }

  .plan-day-recipe {
    font-family: 'Playfair Display', serif;
    font-size: 0.88rem;
    color: var(--ink);
    line-height: 1.3;
    margin-top: 0.15rem;
  }

  /* ── RECIPE GRID ── */
  .recipe-grid {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .recipe-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .recipe-card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border-color: #d4c4b4;
  }

  .recipe-card.open {
    border-color: var(--terracotta);
    box-shadow: 0 4px 20px rgba(194,82,43,0.1);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 1rem 1.1rem;
    cursor: pointer;
    user-select: none;
  }

  .recipe-num {
    font-size: 0.72rem;
    color: var(--text-muted);
    min-width: 1.5rem;
    opacity: 0.5;
    font-weight: 300;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }

  .pill {
    font-size: 0.7rem;
    padding: 0.2rem 0.55rem;
    border-radius: 20px;
    font-weight: 500;
  }

  .pill-protein  { background: var(--light-terra); color: var(--terracotta); }
  .pill-time     { background: #f2ede8; color: var(--text-muted); }
  .pill-tested   { background: var(--light-sage); color: #4a7d4e; }
  .pill-untested { background: #f4f2ef; color: #b0a090; }

  .card-chevron {
    color: var(--text-muted);
    font-size: 1.4rem;
    transition: transform 0.25s;
    opacity: 0.5;
    flex-shrink: 0;
  }

  .recipe-card.open .card-chevron {
    transform: rotate(90deg);
    opacity: 1;
    color: var(--terracotta);
  }

  /* ── DETAIL ── */
  .recipe-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .recipe-card.open .recipe-detail { max-height: 4000px; }

  .detail-inner {
    border-top: 1px solid var(--border);
    padding: 1.2rem 1.1rem 1.4rem;
    display: grid;
    gap: 1.4rem;
    background: var(--warm-white);
  }

  .detail-section h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 0.75rem;
  }

  /* ── INGREDIENTS ── */
  .ingredients-list {
    list-style: none;
    display: flex;
    flex-direction: column;
  }

  .ingredients-list li {
    font-size: 0.9rem;
    padding: 0.35rem 0;
    border-bottom: 1px solid #f0ece6;
    line-height: 1.45;
    display: flex;
    gap: 0.5rem;
    align-items: baseline;
    color: var(--ink);
  }

  .ingredients-list li::before {
    content: '·';
    color: var(--terracotta);
    flex-shrink: 0;
    font-size: 1.1rem;
    line-height: 1;
  }

  .ingredients-list li.group-header {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 500;
    padding-top: 0.7rem;
    border-bottom: none;
  }

  .ingredients-list li.group-header::before { display: none; }

  .ing-group {
    color: var(--text-muted);
    font-size: 0.8rem;
    flex-shrink: 0;
  }

  /* ── STEPS ── */
  .steps-list {
    list-style: none;
    counter-reset: step;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }

  .steps-list li {
    counter-increment: step;
    display: grid;
    grid-template-columns: 1.8rem 1fr;
    gap: 0.65rem;
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--ink);
  }

  .steps-list li::before {
    content: counter(step);
    font-size: 0.7rem;
    font-weight: 600;
    color: white;
    background: var(--warm-brown);
    width: 1.5rem;
    height: 1.5rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 0.2rem;
    flex-shrink: 0;
  }

  /* ── NOTES ── */
  .notes-box {
    background: #fffbf0;
    border: 1px solid #f0dfa0;
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    padding: 0.75rem 0.9rem;
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.6;
    font-style: italic;
  }

  /* ── EMPTY & LOADING ── */
  .empty, .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }

  .loading-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
    display: inline-block;
    animation: spin 1.5s linear infinite;
    opacity: 0.4;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCROLL TO TOP ── */
  #scrolltop {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--warm-brown);
    color: white;
    border: none;
    border-radius: 50%;
    width: 2.8rem;
    height: 2.8rem;
    font-size: 1.2rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 99;
    transition: transform 0.15s;
  }

  #scrolltop:hover { transform: scale(1.08); }
  #scrolltop.visible { display: flex; }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    opacity: 0.6;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Recept<em>boken</em></h1>
    <span class="recipe-count" id="countDisplay">— recept</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="search" placeholder="Sök på namn, ingrediens, tagg…" autocomplete="off">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="alla">Alla</button>
    <button class="filter-btn" data-filter="provat">✓ Provat</button>
    <button class="filter-btn" data-filter="fisk">Fisk</button>
    <button class="filter-btn" data-filter="kyckling">Kyckling</button>
    <button class="filter-btn" data-filter="vegetarisk">Vegetarisk</button>
    <button class="filter-btn" data-filter="kött">Kött</button>
    <button class="filter-btn" data-filter="fläsk">Fläsk</button>
    <button class="filter-btn" data-filter="snabb">Snabb &lt;30 min</button>
    <button class="filter-btn" data-filter="soppa">Soppa</button>
    <button class="filter-btn" data-filter="pasta">Pasta</button>
  </div>
</header>

<main>
  <div class="plan-banner" id="planBanner">
    <div class="plan-banner-title">📅 Veckans matsedel</div>
    <div class="plan-days" id="planDays"></div>
  </div>

  <p class="results-info" id="resultsInfo"></p>

  <div id="loadingState" class="loading">
    <div class="loading-icon">⟳</div>
    <p>Laddar receptbok…</p>
  </div>

  <div class="recipe-grid" id="recipeGrid"></div>

  <div class="empty" id="emptyState" style="display:none">
    <div style="font-size:2.5rem;margin-bottom:1rem">🍽️</div>
    <p>Inga recept matchade sökningen.</p>
  </div>
</main>

<footer id="footerEl">Receptboken</footer>
<button id="scrolltop" title="Till toppen">↑</button>

<script>
const proteinLabel = {
  fisk: 'Fisk/Skaldjur', kyckling: 'Kyckling', kött: 'Kött',
  fläsk: 'Fläsk', vegetarisk: 'Vegetarisk'
};

function timeStr(r) {
  if (!r.time) return null;
  const base = r.time < 60 ? r.time + ' min' : (r.time/60).toFixed(1).replace('.0','') + ' h';
  return r.timeNote && r.timeNote.startsWith('+') ? base + ' ' + r.timeNote : base;
}

function renderIngredient(i) {
  if (!i.includes(':')) return `<li>${i}</li>`;
  const colon = i.indexOf(':');
  const label = i.substring(0, colon).trim();
  const val   = i.substring(colon + 1).trim();
  if (!val) return `<li class="group-header">${label}</li>`;
  return `<li><span class="ing-group">${label}:</span> ${val}</li>`;
}

function renderCard(r) {
  const t = timeStr(r);
  const ingHtml   = r.ingredients.map(renderIngredient).join('');
  const stepsHtml = r.instructions.map(s => `<li>${s}</li>`).join('');
  const notesHtml = r.notes
    ? `<div class="detail-section"><h3>Noteringar</h3><div class="notes-box">💡 ${r.notes}</div></div>`
    : '';

  return `
<div class="recipe-card"
     data-id="${r.id}"
     data-title="${r.title.toLowerCase()}"
     data-protein="${r.protein}"
     data-tags="${r.tags.join(' ')}"
     data-tested="${r.tested}"
     data-time="${r.time || 999}"
     data-ingredients="${r.ingredients.join(' ').toLowerCase()}"
     data-instructions="${r.instructions.join(' ').toLowerCase()}">
  <div class="card-header" onclick="toggleCard(this.closest('.recipe-card'))">
    <div class="recipe-num">${r.id}</div>
    <div class="card-info">
      <div class="card-title">${r.title}</div>
      <div class="card-meta">
        <span class="pill pill-protein">${proteinLabel[r.protein] || r.protein}</span>
        ${t ? `<span class="pill pill-time">⏱ ${t}</span>` : ''}
        <span class="pill ${r.tested ? 'pill-tested' : 'pill-untested'}">${r.tested ? '✓ Provat' : 'Ej provat'}</span>
      </div>
    </div>
    <span class="card-chevron">›</span>
  </div>
  <div class="recipe-detail">
    <div class="detail-inner">
      <div class="detail-section">
        <h3>Ingredienser · ${r.servings} portioner</h3>
        <ul class="ingredients-list">${ingHtml}</ul>
      </div>
      <div class="detail-section">
        <h3>Tillagning</h3>
        <ol class="steps-list">${stepsHtml}</ol>
      </div>
      ${notesHtml}
    </div>
  </div>
</div>`;
}

let RECIPES = [];
let activeFilter = 'alla';

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cards = document.querySelectorAll('.recipe-card');
  let shown = 0;

  cards.forEach(card => {
    const protein = card.dataset.protein;
    const tags    = card.dataset.tags;
    const tested  = card.dataset.tested === 'true';
    const time    = parseInt(card.dataset.time);
    const title   = card.dataset.title;
    const ings    = card.dataset.ingredients;
    const steps   = card.dataset.instructions;

    let passFilter = true;
    if (activeFilter === 'provat')     passFilter = tested;
    else if (activeFilter === 'snabb') passFilter = time <= 30;
    else if (activeFilter !== 'alla')  passFilter = protein === activeFilter || tags.includes(activeFilter);

    const passSearch = !q || title.includes(q) || protein.includes(q) || tags.includes(q)
      || ings.includes(q) || steps.includes(q);

    const show = passFilter && passSearch;
    card.style.display = show ? '' : 'none';
    if (!show) card.classList.remove('open');
    if (show) shown++;
  });

  document.getElementById('emptyState').style.display = shown === 0 ? 'block' : 'none';
  document.getElementById('resultsInfo').textContent = (q || activeFilter !== 'alla')
    ? `Visar ${shown} av ${RECIPES.length} recept` : '';
}

function toggleCard(card) {
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.recipe-card.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    card.classList.add('open');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
  }
}

function jumpToRecipe(title) {
  activeFilter = 'alla';
  document.getElementById('search').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="alla"]').classList.add('active');
  applyFilters();
  document.querySelectorAll('.recipe-card').forEach(card => {
    if (card.dataset.title === title.toLowerCase()) {
      toggleCard(card);
      setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }
  });
}

async function loadWeeklyPlan() {
  try {
    const res = await fetch('weekly-plan.json');
    if (!res.ok) return;
    const plan = await res.json();
    if (!plan.days?.length) return;
    document.getElementById('planBanner').classList.add('visible');
    document.getElementById('planDays').innerHTML = plan.days.map(d => `
      <div class="plan-day" onclick="jumpToRecipe('${d.recipe.replace(/'/g,"\\'")}')">
        <div class="plan-day-name">${d.day}</div>
        <div class="plan-day-recipe">${d.recipe}</div>
      </div>`).join('');
  } catch(e) {}
}

async function init() {
  try {
    const res = await fetch('recipes.json');
    if (!res.ok) throw new Error('Kunde inte ladda recipes.json');
    const data = await res.json();
    RECIPES = data.recipes;
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('recipeGrid').innerHTML = RECIPES.map(renderCard).join('');
    document.getElementById('countDisplay').textContent = `${RECIPES.length} recept`;
    document.getElementById('footerEl').textContent =
      `Receptboken · ${data.meta?.lastUpdated || ''} · ${RECIPES.length} recept`;
    applyFilters();
    await loadWeeklyPlan();
  } catch(err) {
    document.getElementById('loadingState').innerHTML = `
      <div style="font-size:2rem;margin-bottom:1rem">⚠️</div>
      <p style="color:var(--terracotta)">${err.message}</p>`;
  }
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  applyFilters();
});

const scrollBtn = document.getElementById('scrolltop');
window.addEventListener('scroll', () => scrollBtn.classList.toggle('visible', window.scrollY > 400));
scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

init();
</script>
</body>
</html>

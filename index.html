<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c1008">
<title>Receptboken</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@300;400&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #1c1008;
  --surface:   #251808;
  --card:      #2e1f0a;
  --border:    #4a3018;
  --accent:    #e8a045;
  --accent2:   #c97c2a;
  --text:      #f0e6d3;
  --muted:     #9a7e5e;
  --green:     #7aab6e;
  --blue:      #6a9bbf;
  --red:       #bf5a4a;
  --tag-bg:    rgba(232,160,69,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── NOISE TEXTURE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ── HEADER ── */
header {
  background: linear-gradient(180deg, #120a02 0%, var(--surface) 100%);
  border-bottom: 1px solid var(--border);
  padding: 1.4rem 1.2rem 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 1rem;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.6rem, 6vw, 2.2rem);
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 0.01em;
  line-height: 1;
}

h1 em {
  font-style: italic;
  color: var(--text);
  opacity: 0.75;
}

.count-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
  white-space: nowrap;
  letter-spacing: 0.05em;
}

/* ── SEARCH ── */
.search-wrap {
  position: relative;
  margin-bottom: 0.75rem;
}

.search-icon {
  position: absolute;
  left: 0.85rem;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.4;
  font-size: 0.9rem;
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 0.65rem 1rem 0.65rem 2.4rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}

#search::placeholder { color: var(--muted); opacity: 0.6; }
#search:focus {
  border-color: var(--accent2);
  background: rgba(255,255,255,0.09);
}

/* ── FILTER PILLS ── */
.filters {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.filter-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.3rem 0.75rem;
  border-radius: 4px;
  font-size: 0.78rem;
  cursor: pointer;
  font-family: 'Instrument Sans', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.filter-btn:hover {
  border-color: var(--accent2);
  color: var(--accent);
}

.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  font-weight: 500;
}

/* ── MAIN ── */
main {
  padding: 1.2rem 1rem 5rem;
  max-width: 700px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.results-info {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 0.8rem;
  letter-spacing: 0.04em;
}

/* ── RECIPE CARD ── */
.recipe-grid {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.recipe-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.recipe-card:hover { border-color: var(--accent2); }
.recipe-card.open  { border-color: var(--accent); }

.card-header {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  padding: 0.85rem 1rem;
  cursor: pointer;
  user-select: none;
}

.recipe-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  min-width: 1.6rem;
  opacity: 0.6;
  letter-spacing: 0.03em;
}

.card-info { flex: 1; min-width: 0; }

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  font-weight: 600;
  line-height: 1.25;
  color: var(--text);
  margin-bottom: 0.35rem;
}

.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  align-items: center;
}

.pill {
  font-size: 0.68rem;
  padding: 0.18rem 0.5rem;
  border-radius: 3px;
  font-family: 'Instrument Sans', sans-serif;
  letter-spacing: 0.02em;
  font-weight: 500;
}

.pill-protein {
  background: var(--tag-bg);
  color: var(--accent);
  border: 1px solid rgba(232,160,69,0.2);
}

.pill-time {
  background: rgba(255,255,255,0.05);
  color: var(--muted);
  border: 1px solid var(--border);
}

.pill-tested {
  background: rgba(122,171,110,0.15);
  color: var(--green);
  border: 1px solid rgba(122,171,110,0.25);
}

.pill-untested {
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  border: 1px solid var(--border);
  opacity: 0.6;
}

.card-chevron {
  color: var(--muted);
  font-size: 1.3rem;
  transition: transform 0.25s;
  line-height: 1;
  flex-shrink: 0;
  opacity: 0.5;
}

.recipe-card.open .card-chevron { transform: rotate(90deg); opacity: 1; color: var(--accent); }

/* ── RECIPE DETAIL ── */
.recipe-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.recipe-card.open .recipe-detail { max-height: 4000px; }

.detail-inner {
  border-top: 1px solid var(--border);
  padding: 1.2rem 1rem 1.4rem;
  display: grid;
  gap: 1.4rem;
}

.detail-section h3 {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 0.75rem;
  opacity: 0.8;
}

/* ── INGREDIENTS ── */
.ingredients-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.ingredients-list li {
  font-size: 0.9rem;
  color: var(--text);
  padding: 0.3rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  line-height: 1.4;
  display: flex;
  gap: 0.5rem;
  align-items: baseline;
}

.ingredients-list li::before {
  content: '—';
  color: var(--muted);
  font-size: 0.7rem;
  flex-shrink: 0;
  opacity: 0.5;
}

.ingredients-list li.group-header {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent2);
  padding-top: 0.6rem;
  border-bottom: none;
  opacity: 0.7;
}

.ingredients-list li.group-header::before { display: none; }

.ing-group {
  color: var(--muted);
  font-size: 0.78rem;
  flex-shrink: 0;
}

/* ── STEPS ── */
.steps-list {
  list-style: none;
  counter-reset: step;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
}

.steps-list li {
  counter-increment: step;
  display: grid;
  grid-template-columns: 1.8rem 1fr;
  gap: 0.6rem;
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--text);
}

.steps-list li::before {
  content: counter(step);
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--accent);
  background: rgba(232,160,69,0.1);
  border: 1px solid rgba(232,160,69,0.2);
  width: 1.5rem;
  height: 1.5rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 0.15rem;
  flex-shrink: 0;
}

/* ── NOTES ── */
.notes-box {
  background: rgba(232,160,69,0.06);
  border: 1px solid rgba(232,160,69,0.15);
  border-left: 3px solid var(--accent2);
  border-radius: 4px;
  padding: 0.75rem 0.9rem;
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.6;
  font-style: italic;
}

/* ── EMPTY & LOADING ── */
.empty, .loading {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--muted);
}

.empty-icon, .loading-icon {
  font-size: 2.5rem;
  margin-bottom: 1rem;
  opacity: 0.4;
}

.loading-icon {
  animation: spin 1.5s linear infinite;
  display: inline-block;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── SCROLL TO TOP ── */
#scrolltop {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 50%;
  width: 2.6rem;
  height: 2.6rem;
  font-size: 1rem;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  z-index: 99;
  font-weight: 700;
  transition: transform 0.15s;
}

#scrolltop:hover { transform: scale(1.08); }
#scrolltop.visible { display: flex; }

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 2rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  opacity: 0.4;
  letter-spacing: 0.05em;
}

/* ── WEEKLY PLAN BANNER (future) ── */
.plan-banner {
  background: linear-gradient(135deg, rgba(232,160,69,0.1), rgba(201,124,42,0.05));
  border: 1px solid rgba(232,160,69,0.2);
  border-radius: 8px;
  padding: 1rem 1.1rem;
  margin-bottom: 1.2rem;
  display: none; /* shown when weekly-plan.json exists */
}

.plan-banner.visible { display: block; }

.plan-banner-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent2);
  margin-bottom: 0.5rem;
}

.plan-days {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 0.4rem;
}

.plan-day {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 0.4rem 0.6rem;
  cursor: pointer;
  transition: border-color 0.15s;
}

.plan-day:hover { border-color: var(--accent2); }

.plan-day-name {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  text-transform: uppercase;
  color: var(--muted);
  letter-spacing: 0.08em;
}

.plan-day-recipe {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.88rem;
  color: var(--text);
  line-height: 1.3;
  margin-top: 0.15rem;
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .card-title { font-size: 0.98rem; }
  .detail-inner { padding: 1rem 0.85rem 1.2rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Recept<em>boken</em></h1>
    <span class="count-badge" id="countDisplay">— recept</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="search" type="search" placeholder="Sök namn, ingrediens, tagg…" autocomplete="off">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="alla">Alla</button>
    <button class="filter-btn" data-filter="provat">✓ Provat</button>
    <button class="filter-btn" data-filter="fisk">Fisk</button>
    <button class="filter-btn" data-filter="kyckling">Kyckling</button>
    <button class="filter-btn" data-filter="vegetarisk">Veg</button>
    <button class="filter-btn" data-filter="kött">Kött</button>
    <button class="filter-btn" data-filter="fläsk">Fläsk</button>
    <button class="filter-btn" data-filter="snabb">⚡ &lt;30 min</button>
    <button class="filter-btn" data-filter="soppa">Soppa</button>
    <button class="filter-btn" data-filter="pasta">Pasta</button>
    <button class="filter-btn" data-filter="vardag30">Vardag</button>
  </div>
</header>

<main>
  <!-- Weekly plan banner — shown when weekly-plan.json is present -->
  <div class="plan-banner" id="planBanner">
    <div class="plan-banner-title">📅 Veckans matsedel</div>
    <div class="plan-days" id="planDays"></div>
  </div>

  <p class="results-info" id="resultsInfo"></p>
  <div id="loadingState" class="loading">
    <div class="loading-icon">⟳</div>
    <p>Laddar receptbok…</p>
  </div>
  <div class="recipe-grid" id="recipeGrid"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="empty-icon">🍽</div>
    <p>Inga recept matchade sökningen.</p>
  </div>
</main>

<footer id="footerEl">Receptboken</footer>

<button id="scrolltop" title="Till toppen">↑</button>

<script>
// ── PROTEIN LABELS ──
const proteinLabel = {
  fisk: 'Fisk/Skaldjur',
  kyckling: 'Kyckling',
  kött: 'Kött',
  fläsk: 'Fläsk',
  vegetarisk: 'Vegetarisk'
};

// ── TIME STRING ──
function timeStr(r) {
  if (!r.time) return null;
  const base = r.time < 60
    ? r.time + ' min'
    : (r.time / 60).toFixed(1).replace('.0', '') + ' h';
  return r.timeNote && r.timeNote.startsWith('+')
    ? base + ' ' + r.timeNote
    : base;
}

// ── RENDER INGREDIENT LINE ──
function renderIngredient(i) {
  if (!i.includes(':')) return `<li>${i}</li>`;
  const colon = i.indexOf(':');
  const label = i.substring(0, colon).trim();
  const val   = i.substring(colon + 1).trim();
  if (!val) return `<li class="group-header">${label}</li>`;
  return `<li><span class="ing-group">${label}:</span> ${val}</li>`;
}

// ── RENDER CARD ──
function renderCard(r) {
  const t = timeStr(r);
  const ingHtml   = r.ingredients.map(renderIngredient).join('');
  const stepsHtml = r.instructions.map(s => `<li>${s}</li>`).join('');
  const notesHtml = r.notes
    ? `<div class="detail-section"><h3>Noteringar</h3><div class="notes-box">${r.notes}</div></div>`
    : '';

  return `
<div class="recipe-card"
     data-id="${r.id}"
     data-title="${r.title.toLowerCase()}"
     data-protein="${r.protein}"
     data-tags="${r.tags.join(' ')}"
     data-tested="${r.tested}"
     data-time="${r.time || 999}"
     data-ingredients="${r.ingredients.join(' ').toLowerCase()}"
     data-instructions="${r.instructions.join(' ').toLowerCase()}">
  <div class="card-header" onclick="toggleCard(this.closest('.recipe-card'))">
    <div class="recipe-num">${String(r.id).padStart(2,'0')}</div>
    <div class="card-info">
      <div class="card-title">${r.title}</div>
      <div class="card-meta">
        <span class="pill pill-protein">${proteinLabel[r.protein] || r.protein}</span>
        ${t ? `<span class="pill pill-time">⏱ ${t}</span>` : ''}
        <span class="pill ${r.tested ? 'pill-tested' : 'pill-untested'}">${r.tested ? '✓ Provat' : 'Ej provat'}</span>
      </div>
    </div>
    <span class="card-chevron">›</span>
  </div>
  <div class="recipe-detail">
    <div class="detail-inner">
      <div class="detail-section">
        <h3>Ingredienser · ${r.servings} portioner</h3>
        <ul class="ingredients-list">${ingHtml}</ul>
      </div>
      <div class="detail-section">
        <h3>Tillagning</h3>
        <ol class="steps-list">${stepsHtml}</ol>
      </div>
      ${notesHtml}
    </div>
  </div>
</div>`;
}

// ── STATE ──
let RECIPES = [];
let activeFilter = 'alla';

// ── FILTER & SEARCH ──
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cards = document.querySelectorAll('.recipe-card');
  let shown = 0;

  cards.forEach(card => {
    const protein = card.dataset.protein;
    const tags    = card.dataset.tags;
    const tested  = card.dataset.tested === 'true';
    const time    = parseInt(card.dataset.time);
    const title   = card.dataset.title;
    const ings    = card.dataset.ingredients;
    const steps   = card.dataset.instructions;

    let passFilter = true;
    if (activeFilter === 'provat') passFilter = tested;
    else if (activeFilter === 'snabb') passFilter = time <= 30;
    else if (activeFilter !== 'alla') {
      passFilter = protein === activeFilter || tags.includes(activeFilter);
    }

    const passSearch = !q
      || title.includes(q)
      || protein.includes(q)
      || tags.includes(q)
      || ings.includes(q)
      || steps.includes(q);

    const show = passFilter && passSearch;
    card.style.display = show ? '' : 'none';
    if (!show) card.classList.remove('open');
    if (show) shown++;
  });

  document.getElementById('emptyState').style.display = shown === 0 ? 'block' : 'none';
  document.getElementById('resultsInfo').textContent = (q || activeFilter !== 'alla')
    ? `Visar ${shown} av ${RECIPES.length} recept`
    : '';
}

// ── TOGGLE CARD ──
function toggleCard(card) {
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.recipe-card.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    card.classList.add('open');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
  }
}

// ── JUMP TO RECIPE (from weekly plan) ──
function jumpToRecipe(title) {
  const cards = document.querySelectorAll('.recipe-card');
  for (const card of cards) {
    if (card.dataset.title === title.toLowerCase()) {
      // reset filters first
      activeFilter = 'alla';
      document.getElementById('search').value = '';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-filter="alla"]').classList.add('active');
      applyFilters();

      toggleCard(card);
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      return;
    }
  }
}

// ── LOAD WEEKLY PLAN ──
async function loadWeeklyPlan() {
  try {
    const res = await fetch('weekly-plan.json');
    if (!res.ok) return;
    const plan = await res.json();
    if (!plan.days || !plan.days.length) return;

    const banner = document.getElementById('planBanner');
    const daysEl = document.getElementById('planDays');
    banner.classList.add('visible');

    daysEl.innerHTML = plan.days.map(d => `
      <div class="plan-day" onclick="jumpToRecipe('${d.recipe.replace(/'/g,"\\'")}')">
        <div class="plan-day-name">${d.day}</div>
        <div class="plan-day-recipe">${d.recipe}</div>
      </div>
    `).join('');
  } catch (e) {
    // weekly-plan.json doesn't exist yet — that's fine
  }
}

// ── LOAD RECIPES ──
async function init() {
  try {
    const res = await fetch('recipes.json');
    if (!res.ok) throw new Error('Kunde inte ladda recipes.json');
    const data = await res.json();
    RECIPES = data.recipes;

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('recipeGrid').innerHTML = RECIPES.map(renderCard).join('');
    document.getElementById('countDisplay').textContent = `${RECIPES.length} recept`;

    const meta = data.meta;
    document.getElementById('footerEl').textContent =
      `Receptboken · ${meta?.lastUpdated || ''} · ${RECIPES.length} recept`;

    applyFilters();
    await loadWeeklyPlan();

  } catch (err) {
    document.getElementById('loadingState').innerHTML = `
      <div class="empty-icon">⚠</div>
      <p style="color:var(--red)">${err.message}</p>
      <p style="font-size:0.8rem;margin-top:0.5rem;color:var(--muted)">
        Kontrollera att recipes.json finns i samma mapp.
      </p>`;
  }
}

// ── SEARCH & FILTER EVENTS ──
document.getElementById('search').addEventListener('input', applyFilters);

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  applyFilters();
});

// ── SCROLL TO TOP ──
const scrollBtn = document.getElementById('scrolltop');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 400);
});
scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── START ──
init();
</script>
</body>
</html>

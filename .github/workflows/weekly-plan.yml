name: Generera veckoplan

on:
  schedule:
    - cron: '0 6 * * 0'  # Söndagar 06:00 UTC — genererar idag + 6 dagar
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Startdatum (YYYY-MM-DD, lämna tomt för idag)'
        required: false
        default: ''
      end_date:
        description: 'Slutdatum (YYYY-MM-DD, lämna tomt för startdatum + 6 dagar)'
        required: false
        default: ''

permissions:
  contents: write  # Krävs för att committa tillbaka genererade JSON-filer

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut repo
        uses: actions/checkout@v4

      - name: Installera Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installera beroenden
        run: pip install requests anthropic

      - name: Generera veckoplan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
        run: python scripts/generate_weekly_plan.py

      - name: Committa och pusha genererade filer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add offers.json weekly-plan.json shopping-list.json
          git diff --cached --quiet || git commit -m "Matsedel $(date +%Y-%m-%d) — autogenererad"
          git push
